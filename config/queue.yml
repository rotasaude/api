# Solid Queue — pools por fila/SLA. Ver ADR-0008.
# Carregado por bin/jobs (supervisor) em todos os ambientes.

default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # urgent: alertas à secretaria — pool dedicado, prioridade alta.
    - queues: urgent
      threads: 3
      processes: 1
      polling_interval: 0.1

    # realtime: webhook do WhatsApp e envio outbound — SLA < 5s.
    - queues: realtime
      threads: 5
      processes: 1
      polling_interval: 0.1

    # default: notificações ao cidadão e qualquer job sem queue_as.
    - queues: default
      threads: 3
      processes: 1
      polling_interval: 0.5

    # reports: geração de relatório e atualização de dashboard.
    - queues: reports
      threads: 2
      processes: 1
      polling_interval: 1

    # housekeeping: purges, reconciliação, jobs recorrentes.
    - queues: housekeeping
      threads: 1
      processes: 1
      polling_interval: 5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
  workers:
    - queues: urgent
      threads: 5
      processes: 1
      polling_interval: 0.1
    - queues: realtime
      threads: 10
      processes: 1
      polling_interval: 0.1
    - queues: default
      threads: 5
      processes: 1
      polling_interval: 0.5
    - queues: reports
      threads: 3
      processes: 1
      polling_interval: 1
    - queues: housekeeping
      threads: 2
      processes: 1
      polling_interval: 5
