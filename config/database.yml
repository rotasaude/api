default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  prepared_statements: true
  variables:
    statement_timeout: 15s

# Múltiplas conexões: primary (rota_app, sujeito a RLS) + admin (rota_admin, BYPASSRLS).
# Ver ADR-0019.
development:
  primary:
    <<: *default
    database: rota_saude_development
    username: rota_app
    password: <%= ENV.fetch("ROTA_APP_PASSWORD", "rota_app") %>
    host: <%= ENV.fetch("DATABASE_HOST", "127.0.0.1") %>
    port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  admin:
    <<: *default
    database: rota_saude_development
    username: rota_admin
    password: <%= ENV.fetch("ROTA_ADMIN_PASSWORD", "rota_admin") %>
    host: <%= ENV.fetch("DATABASE_HOST", "127.0.0.1") %>
    port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
    migrations_paths: db/migrate
  queue:
    <<: *default
    database: rota_saude_development
    username: rota_admin
    password: <%= ENV.fetch("ROTA_ADMIN_PASSWORD", "rota_admin") %>
    host: <%= ENV.fetch("DATABASE_HOST", "127.0.0.1") %>
    port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
    migrations_paths: db/queue_migrate
    schema_dump: queue_schema.rb
  cache:
    <<: *default
    database: rota_saude_development
    username: rota_admin
    password: <%= ENV.fetch("ROTA_ADMIN_PASSWORD", "rota_admin") %>
    host: <%= ENV.fetch("DATABASE_HOST", "127.0.0.1") %>
    port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
    migrations_paths: db/cache_migrate
    schema_dump: cache_schema.rb

